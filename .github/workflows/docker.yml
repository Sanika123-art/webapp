name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: sanikapalav
          password: dckr_pat_a6nhBqFI_MnDzEQIIwmgY_-IlD0

      - name: Build Docker image
        run: |
          docker build \
            --build-arg CACHE_BUST=$(date +%s) \
            -t sanikapalav/webapp:latest .

      - name: Push Docker image
        run: |
          docker push sanikapalav/webapp:latest
